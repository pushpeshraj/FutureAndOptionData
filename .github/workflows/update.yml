name: Update NSE Participant OI

# DYNAMIC SCHEDULE + FII STATS.
# Fetches BOTH the Participant-wise OI and the FII Derivative Statistics reports.
# Triggered once on weekdays, then waits a RANDOM 0-120 minutes before fetching,
# so the actual run time differs every day.
# To use this: place it at .github/workflows/update.yml (replacing the existing one).
on:
  schedule:
    # Base trigger: 13:00 UTC (~6:30 PM IST), weekdays only — just after NSE publishes.
    - cron: "0 13 * * 1-5"
  workflow_dispatch:  # lets you run it manually from the Actions tab

# Allow the workflow to commit the refreshed data back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Random delay (varies the run time each day)
        # Skip the wait on manual runs so "Run workflow" is instant.
        if: github.event_name == 'schedule'
        shell: bash   # $RANDOM is a bash feature; pin the shell to be safe
        run: |
          # Sleep 0-120 minutes. Effective fetch time lands ~6:30 PM - ~8:30 PM IST,
          # different every day. Lower MAX_DELAY to use fewer Action minutes.
          MAX_DELAY=7200
          DELAY=$(( RANDOM * 32768 + RANDOM ))
          DELAY=$(( DELAY % (MAX_DELAY + 1) ))
          echo "Waiting ${DELAY}s (~$(( DELAY / 60 )) min) before fetching..."
          sleep "$DELAY"

      - name: Fetch latest report
        run: python fetch_data.py

      - name: Fetch latest FII stats
        run: python fetch_fii_stats.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json participant_oi_*.csv fii_stats.json fii_stats_*.xls
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update participant OI + FII stats data ($(date -u +%Y-%m-%d))"
            git push
          fi
